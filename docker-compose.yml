version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: shopmaster_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: shopmaster
      MYSQL_USER: shopmaster
      MYSQL_PASSWORD: shoppassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: shopmaster_api
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: shopmaster
      DB_PASSWORD: shoppassword
      DB_NAME: shopmaster
      JWT_SECRET: change_this_secret_in_production
      JWT_EXPIRES_IN: 7d
      SHOP_NAME: Lumoz
      CLIENT_URL: http://localhost:3000
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: shopmaster_web
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
